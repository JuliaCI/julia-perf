<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Julia performance data</title>
  {% block preload %}{% endblock %}
  <link rel="icon" type="image/png" href="/julia.png">
  <script src="dark.js"></script>
  <link rel="stylesheet" type="text/css" href="styles/shared.css">
  <link rel="stylesheet" type="text/css" href="styles/dark.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% block head %}{% endblock %}
</head>
<body class="container">
  <header class="page-header">
    <div class="page-title">Julia performance data</div>
    <nav class="page-nav" aria-label="Site">
      <a href="/">compare</a>
      <span aria-hidden="true">/</span>
      <a href="graphs.html">graphs</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
  <footer class="page-footer">
    <a href="https://github.com/Zentrik/rustc-perf">Contribute on GitHub</a>
    <div>
      Adapted from
      <a href="https://github.com/rust-lang/rustc-perf">rustc-perf</a>
      by the Rust team and contributors
    </div>
  </footer>
  {% block script %}{% endblock %}
  <script>
    // When embedded in an iframe, post URL changes to the parent so it can
    // reflect the current view in its own address bar / deep links.
    (function () {
      if (window.parent === window) return;
      // Only post to known parent origins. postMessage with a specific
      // targetOrigin is a no-op if it doesn't match the parent, so it's
      // safe to attempt all allowed origins.
      const ALLOWED_ORIGINS = [
        "https://juliaci.github.io",
        "https://julialang.org",
      ];
      function isAllowedOrigin(origin) {
        if (ALLOWED_ORIGINS.includes(origin)) return true;
        try {
          const host = new URL(origin).hostname;
          return host === "julialang.org" || host.endsWith(".julialang.org");
        } catch (e) {
          return false;
        }
      }
      const targets = new Set(ALLOWED_ORIGINS);
      // Also try the referrer's origin if it's a julialang.org subdomain.
      if (document.referrer) {
        try {
          const refOrigin = new URL(document.referrer).origin;
          if (isAllowedOrigin(refOrigin)) targets.add(refOrigin);
        } catch (e) { /* ignore */ }
      }
      function post() {
        const msg = {
          type: "julia-perf-url",
          pathname: location.pathname,
          search: location.search,
          hash: location.hash,
        };
        for (const origin of targets) {
          try { window.parent.postMessage(msg, origin); } catch (e) { /* ignore */ }
        }
      }
      for (const method of ["pushState", "replaceState"]) {
        const orig = history[method];
        history[method] = function () {
          const ret = orig.apply(this, arguments);
          post();
          return ret;
        };
      }
      window.addEventListener("popstate", post);
      window.addEventListener("hashchange", post);
      post();
    })();

    // When embedded in an iframe, open any cross-origin link in a new tab
    // (sandboxing/CSP often prevents top-level navigation from inside the
    // iframe, which makes such links appear broken).
    (function () {
      if (window.parent === window) return;
      document.addEventListener("click", function (e) {
        const a = e.target.closest && e.target.closest("a[href]");
        if (!a) return;
        if (a.target && a.target !== "" && a.target !== "_self") return;
        const href = a.getAttribute("href");
        if (!href || href.startsWith("#") || href.startsWith("javascript:")) return;
        let url;
        try { url = new URL(a.href, location.href); } catch (_) { return; }
        if (url.origin === location.origin) return;
        a.target = "_blank";
        a.relList.add("noopener", "noreferrer");
      }, true);
    })();
  </script>
</body>
</html>
